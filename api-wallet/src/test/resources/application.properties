# Keycloak Configuration
keycloak.realm=recargapay_wallet_test
keycloak.auth-server-url=http://keycloak:8080
keycloak.resource=api-wallet
keycloak.bearer-only=true

logging.file.path=/var/log/api-wallet
logging.file.name=/var/log/api-wallet/application.log
logging.level.root=INFO


logging.level.org.springframework.security=DEBUG

spring.security.oauth2.resourceserver.jwt.issuer-uri=test-issuer

spring.security.oauth2.resourceserver.jwt.public-key=----- BEGIN PUBLIC KEY----- ----- END PUBLIC KEY----

test.jwt.private-key-path=classpath:private.pem


spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none
spring.main.allow-bean-definition-overriding=true


