server:
  http_listen_port: 3100

auth_enabled: false

common:
  path_prefix: /loki
  replication_factor: 1  # Configuração para 1 réplica apenas
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  ring:
    kvstore:
      store: inmemory
    replication_factor: 1  # Garante que apenas uma réplica é necessária

distributor:
  ring:
    kvstore:
      store: inmemory


ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
  chunk_idle_period: 5m
  chunk_retain_period: 30s

schema_config:
  configs:
    - from: 2022-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v13  # Atualizamos para v13 para suporte a Structured Metadata
      index:
        prefix: loki_index_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/cache
  filesystem:
    directory: /loki/chunks

limits_config:
  allow_structured_metadata: false  # Desativado para resolver erro de Structured Metadata
  reject_old_samples: true
  reject_old_samples_max_age: 168h

compactor:
  working_directory: /loki/compactor

table_manager:
  retention_deletes_enabled: true
  retention_period: 336h  # Retém logs por 14 dias
