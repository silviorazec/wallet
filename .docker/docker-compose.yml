services:
  keycloak-mysql:
    image: mysql
    container_name: keycloak-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: keycloak
      MYSQL_USER: keycloak
      MYSQL_PASSWORD: keycloak
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      app-network:
        aliases:
          - mysql

  api-wallet:
    image: "${API_IMAGE_NAME}:${API_IMAGE_VERSION}"
    container_name: api-wallet
    volumes:
      - ./logs/api-wallet:/var/log/api-wallet 
    environment:
      - TZ=America/Sao_Paulo
    ports:
      - "8084:8084"
    networks:
      app-network:
        aliases:
          - api-wallet
  postgres:
    image: postgres
    container_name: postgres-wallet
    volumes:
      - ../.data/ddl.sql:/docker-entrypoint-initdb.d/ddl.sql
      - ../.data/dml.sql:/docker-entrypoint-initdb.d/dml.sql
    environment:
      POSTGRES_PASSWORD: "Postgres2022!"
      TZ: "America/Sao_Paulo"
    ports:
      - "5432:5432"
    networks:
      app-network:
        aliases:
          - postgres
  worker-wallet:
    image: "${WORKER_IMAGE_NAME}:${WORKER_IMAGE_VERSION}"
    container_name: worker-wallet
    volumes:
      - ./logs/worker-wallet:/var/log/worker-wallet     
    environment:
      - TZ=America/Sao_Paulo
    ports:
      - "8085:8085"
    networks:
      app-network:
        aliases:
          - worker-wallet
 
  keycloak:
    depends_on:
      - keycloak-mysql
    image: quay.io/keycloak/keycloak:23.0.4
    container_name: keycloak
    ports:
      - "8080:8080"
    environment:
      KC_DB: mysql
      KC_DB_URL_HOST: mysql
      KC_DB_URL_PORT: 3306
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: "true"
      KC_IMPORT: /opt/keycloak/data/import/realm-export.json
      TZ: "America/Sao_Paulo"
    volumes:
      - ../.keycloak:/opt/keycloak/data/import
    command: ["start-dev", "--import-realm"]
    networks:
      app-network:
        aliases:
          - keycloak

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      TZ: "America/Sao_Paulo"
    networks:
      app-network:
        aliases:
          - zookeeper
  kafka:
    hostname: kafka
    container_name: kafka
    user: "1000:1000"
    depends_on:
      - zookeeper
      - keycloak
    image: confluentinc/cp-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LOG_DIRS: /kafka-data
      TZ: "America/Sao_Paulo"
    volumes:
      - ../.kafka/kafka-data:/kafka-data
      - ../.kafka/wait-for-it.sh:/etc/kafka/wait-for-it.sh
      - ../.kafka/create-topics.sh:/etc/kafka/create-topics.sh
      - ../.kafka/server.properties:/etc/kafka/server.properties
    command: >
      sh -c "
        rm -rf /kafka-data/*  &&
        chmod +x /etc/kafka/wait-for-it.sh &&
        echo 'Verificando Zookeeper...' &&
        /etc/kafka/wait-for-it.sh zookeeper:2181 --timeout=60 &&
        kafka-server-start /etc/kafka/server.properties &&
        echo 'Aguardando 10 segundos...' &&
        sleep 10 &&
        echo 'Criando tópicos...' &&
        /etc/kafka/create-topics.sh &&
        wait"
    networks:
      app-network:
        aliases:
          - kafka

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: schema-registry
    hostname: schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    volumes:
      - ../.registry/register-schemas.sh:/usr/bin/register-schemas.sh
      - ../.registry/wait-for-it.sh:/etc/schema-registry/wait-for-it.sh
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      TZ: "America/Sao_Paulo"
    entrypoint: >
      sh -c "
        chmod +x /usr/bin/register-schemas.sh &&
        chmod +x /etc/schema-registry/wait-for-it.sh &&
        /etc/schema-registry/wait-for-it.sh schema-registry:8081 --timeout=60 &&
        /usr/bin/register-schemas.sh &
        exec /etc/confluent/docker/run
      "
    networks:
      app-network:
        aliases:
          - schema-registry

  grafana:
    depends_on:
      - loki
      - promtail
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      app-network:
        aliases:
          - grafana
  
  loki:
    image: grafana/loki
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ../.loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    environment:
      - TZ=America/Sao_Paulo
    networks:
      app-network:
        aliases:
          - loki


  promtail:
    depends_on: 
      - loki
    image: grafana/promtail
    container_name: promtail
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - /var/log:/var/log
      - ./logs/api-wallet:/var/log/api-wallet 
      - ./logs/worker-wallet:/var/log/worker-wallet   
      - ../.promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml
    command: -config.file=/etc/promtail/promtail-config.yaml
    networks:
      app-network:
        aliases:
          -  promtail
          
networks:
  app-network:
    driver: bridge
volumes:
  libs:
  kafka_data:
  mysql-data:
  loki-data:
  grafana-data:
